<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#F4A460" opacity="0.2"/>
  
  <!-- Mane outer layer -->
  <circle cx="200" cy="200" r="140" fill="#D2691E"/>
  
  <!-- Mane middle layer -->
  <circle cx="200" cy="200" r="120" fill="#CD853F"/>
  
  <!-- Face -->
  <circle cx="200" cy="200" r="90" fill="#F4A460"/>
  
  <!-- Ears -->
  <ellipse cx="150" cy="140" rx="25" ry="35" fill="#CD853F"/>
  <ellipse cx="250" cy="140" rx="25" ry="35" fill="#CD853F"/>
  <ellipse cx="150" cy="145" rx="15" ry="20" fill="#DEB887"/>
  <ellipse cx="250" cy="145" rx="15" ry="20" fill="#DEB887"/>
  
  <!-- Eyes -->
  <circle cx="175" cy="190" r="12" fill="#2F4F4F"/>
  <circle cx="225" cy="190" r="12" fill="#2F4F4F"/>
  <circle cx="178" cy="187" r="5" fill="white"/>
  <circle cx="228" cy="187" r="5" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="200" cy="215" rx="15" ry="12" fill="#8B4513"/>
  
  <!-- Mouth -->
  <path d="M 200 215 Q 185 230 175 225" stroke="#2F4F4F" stroke-width="3" fill="none"/>
  <path d="M 200 215 Q 215 230 225 225" stroke="#2F4F4F" stroke-width="3" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="140" y1="210" x2="100" y2="205" stroke="#2F4F4F" stroke-width="2"/>
  <line x1="140" y1="220" x2="100" y2="220" stroke="#2F4F4F" stroke-width="2"/>
  <line x1="140" y1="230" x2="100" y2="235" stroke="#2F4F4F" stroke-width="2"/>
  
  <line x1="260" y1="210" x2="300" y2="205" stroke="#2F4F4F" stroke-width="2"/>
  <line x1="260" y1="220" x2="300" y2="220" stroke="#2F4F4F" stroke-width="2"/>
  <line x1="260" y1="230" x2="300" y2="235" stroke="#2F4F4F" stroke-width="2"/>
</svg>
