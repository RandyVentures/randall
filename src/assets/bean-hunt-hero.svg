<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#3E2723"/>
  
  <!-- Decorative coffee beans scattered -->
  <ellipse cx="150" cy="100" rx="25" ry="35" fill="#5D4037" transform="rotate(25 150 100)" opacity="0.3"/>
  <ellipse cx="1050" cy="500" rx="25" ry="35" fill="#5D4037" transform="rotate(-15 1050 500)" opacity="0.3"/>
  <ellipse cx="200" cy="550" rx="20" ry="30" fill="#5D4037" transform="rotate(45 200 550)" opacity="0.3"/>
  <ellipse cx="1100" cy="120" rx="20" ry="30" fill="#5D4037" transform="rotate(-30 1100 120)" opacity="0.3"/>
  
  <!-- Coffee cup icon -->
  <g transform="translate(400, 180)">
    <!-- Cup body -->
    <path d="M 50 50 L 80 200 L 220 200 L 250 50 Z" fill="#FFF8E1" stroke="#D4A574" stroke-width="3"/>
    
    <!-- Cup handle -->
    <path d="M 250 80 Q 300 120 250 160" fill="none" stroke="#D4A574" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Coffee inside -->
    <ellipse cx="150" cy="60" rx="95" ry="20" fill="#8D6E63"/>
    
    <!-- Steam -->
    <path d="M 120 30 Q 115 10 120 -10" fill="none" stroke="#FFF8E1" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M 150 20 Q 145 0 150 -20" fill="none" stroke="#FFF8E1" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M 180 30 Q 175 10 180 -10" fill="none" stroke="#FFF8E1" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- "Bean Hunt" text -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FFF8E1" text-anchor="middle">Bean Hunt</text>
  
  <!-- Tagline -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="32" fill="#D4A574" text-anchor="middle">Discover. Track. Share.</text>
  
  <!-- Decorative coffee beans around text -->
  <ellipse cx="320" cy="410" rx="18" ry="26" fill="#8D6E63" transform="rotate(30 320 410)"/>
  <ellipse cx="880" cy="410" rx="18" ry="26" fill="#8D6E63" transform="rotate(-30 880 410)"/>
  
  <!-- Bottom accent line -->
  <line x1="400" y1="520" x2="800" y2="520" stroke="#D4A574" stroke-width="2"/>
</svg>
